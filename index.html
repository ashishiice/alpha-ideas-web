
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Ideas Archive | Indian Markets</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #7d8590;
            --accent-green: #238636;
            --accent-gold: #e3b341;
            --accent-red: #da3633;
            --accent-blue: #58a6ff;
            --border: #30363d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
        }
        
        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .ideas-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .idea-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }
        
        .idea-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-gold);
        }
        
        .idea-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .idea-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }
        
        .idea-title {
            font-size: 1.25rem;
            color: var(--accent-blue);
        }
        
        .idea-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }
        
        .idea-summary {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .idea-meta {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .meta-tag {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }
        
        .meta-tag.return {
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
        }
        
        .meta-tag.risk {
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }
        
        .meta-tag.timeframe {
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        
        .empty-state h2 {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

        function renderIdeas() {
            const list = document.getElementById('ideasList');
            const empty = document.getElementById('emptyState');
            
            if (ideas.length === 0) {
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            list.innerHTML = ideas.map(idea => `
                <div class="idea-card" onclick="window.location.href='${idea.url}'">
                    <a href="${idea.url}">
                        <div class="idea-header">
                            <h2 class="idea-title">${idea.title}</h2>
                            <span class="idea-date">${idea.date}</span>
                        </div>
                        <p class="idea-summary">${idea.summary}</p>
                        <div class="idea-meta">

                            <span class="meta-tag return">Expected: ${idea.expectedReturn}</span>

        renderIdeas();

</body>
</html>
